services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  users_db:
    image: postgres:15
    container_name: users_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: users_db
    ports:
      - "5432:5432"
    volumes:
      - users_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d users_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  posts_db:
    image: postgres:15
    container_name: posts_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: posts_db
    ports:
      - "5433:5432"
    volumes:
      - posts_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d posts_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  posts_service:
    build:
      context: ./posts_service
    container_name: posts_service
    ports:
      - "8002:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://user:password@posts_db:5432/posts_db
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    restart: on-failure
    depends_on:
      posts_db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  users_service:
    build:
      context: ./users_service
    container_name: users_service
    ports:
      - "8001:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://user:password@users_db:5432/users_db
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    restart: on-failure
    depends_on:
      users_db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      posts_service:
        condition: service_started

  frontend:
    build:
      context: ./frontend
    container_name: frontend
    ports:
      - "3000:3000"
    restart: on-failure
    depends_on:
      users_service:
        condition: service_started
      posts_service:
        condition: service_started

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    restart: unless-stopped

volumes:
  users_db_data:
  posts_db_data: