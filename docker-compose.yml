services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

  users_db:
    image: postgres:15
    container_name: users_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: users_db
    ports:
      - "5432:5432"
    volumes:
      - users_db_data:/var/lib/postgresql/data

  posts_db:
    image: postgres:15
    container_name: posts_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: posts_db
    ports:
      - "5433:5432"
    volumes:
      - posts_db_data:/var/lib/postgresql/data

  posts_service:
    build:
      context: ./posts_service
    container_name: posts_service
    ports:
      - "8002:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://user:password@posts_db:5432/posts_db
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    depends_on:
      posts_db:
        condition: service_started
      rabbitmq:
        condition: service_started

  users_service:
    build:
      context: ./users_service
    container_name: users_service
    ports:
      - "8001:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://user:password@users_db:5432/users_db
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    depends_on:
      users_db:
        condition: service_started
      rabbitmq:
        condition: service_started
      posts_service:
        condition: service_started

  frontend:
    build:
      context: ./frontend
    container_name: frontend
    ports:
      - "3000:3000"
    depends_on:
      users_service:
        condition: service_started
      posts_service:
        condition: service_started

volumes:
  users_db_data:
  posts_db_data:
